<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Div Example</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
<section id="bcr-search-section">

  <div class="topbar">
    <span>⚖ Bar Council Election 2026</span>
    <span>22 April</span>
  </div>

  <div class="search-box">
    <input id="searchInput" placeholder="Search name...">
  </div>

  <div id="resultsArea"></div>

  <!-- MODAL -->
  <div id="modalOverlay" onclick="closeModal()">
    <div id="modalBox" onclick="event.stopPropagation()"></div>
  </div>

</section>
</body>
</html>
